<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiQuote Opportunity Alerts • Modern Table View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --elcom-blue: 12 191 202; }
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        table { border-collapse: collapse; }
        th { background-color: rgb(var(--elcom-blue)); color: white; }
        tr:hover { background-color: #0a2a2c; }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200 h-full">
    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-[#0CBFCA] rounded-2xl flex items-center justify-center text-zinc-950 font-bold text-2xl logo-font">MQ</div>
                    <div class="logo-font text-3xl font-semibold tracking-tighter text-white">MultiQuote</div>
                </div>
                <p class="text-xs text-zinc-400 mt-1">Opportunity Alerts</p>
            </div>
            <div class="flex-1 overflow-y-auto py-6 px-3">
                <nav class="space-y-1">
                    <a href="#" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl bg-zinc-800 text-white font-medium">
                        <i class="fa-solid fa-magnifying-glass w-5"></i>
                        <span>Discover Tenders</span>
                    </a>
                    <a href="#" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-zinc-400">
                        <i class="fa-solid fa-bookmark w-5"></i>
                        <span>My Search Profiles</span>
                    </a>
                    <a href="#" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-zinc-400">
                        <i class="fa-solid fa-bell w-5"></i>
                        <span>My Alerts</span>
                    </a>
                </nav>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
                <div class="flex items-center gap-x-6">
                    <div class="flex items-center gap-x-2 text-[#0CBFCA]">
                        <i class="fa-solid fa-search"></i>
                        <span class="font-semibold">Discover</span>
                    </div>
                    <input id="global-search" placeholder="Quick keyword search..." class="bg-zinc-800 border border-zinc-700 focus:border-[#0CBFCA] rounded-3xl px-6 py-2 w-96 text-sm outline-none">
                </div>
                <div class="flex items-center gap-x-6">
                    <button onclick="saveCurrentSearch()" class="flex items-center gap-x-2 px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-3xl">
                        <i class="fa-solid fa-bookmark"></i>
                        <span>Save Profile</span>
                    </button>
                    <button onclick="openAlertModal()" class="flex items-center gap-x-2 px-5 py-2 bg-[#0CBFCA] text-zinc-950 font-medium rounded-3xl">
                        <i class="fa-solid fa-bell"></i>
                        <span>Create Alert</span>
                    </button>
                </div>
            </header>

            <div class="flex-1 p-8 overflow-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left border-b border-zinc-700">
                            <th class="py-4 px-4">Title</th>
                            <th class="py-4 px-4">Published</th>
                            <th class="py-4 px-4">Closing Date</th>
                            <th class="py-4 px-4">Value</th>
                            <th class="py-4 px-4">Buyer</th>
                            <th class="py-4 px-4">Action</th>
                            <th class="py-4 px-4">Type</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-zinc-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allReleases = []; // Global memory for the search bar

        async function fetchAndRenderLiveData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="7" class="py-8 text-center text-[#0CBFCA] animate-pulse">Fetching live data from UK Government FTS...</td></tr>';

            try {
                const response = await fetch('/api/live-data');
                if (!response.ok) throw new Error("Backend not responding");
                const data = await response.json();
                
                allReleases = data.releases || [];

                if (allReleases.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="py-4 text-center text-zinc-400">No contracts found.</td></tr>';
                    return;
                }

                renderTable(allReleases.slice(0, 20));
            } catch (error) {
                console.error("Connection failed:", error);
                tbody.innerHTML = '<tr><td colspan="7" class="py-4 text-center text-red-400">Failed to connect to Java Backend.</td></tr>';
            }
        }

        function renderTable(releasesToRender) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 

            if (releasesToRender.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="py-8 text-center text-zinc-500">No matches found for your search keyword.</td></tr>';
                return;
            }

            releasesToRender.forEach(release => {
                const title = release.tender?.title || "Title Not Disclosed";
                const published = release.date ? release.date.split('T')[0] : "N/A";
                const closing = release.tender?.tenderPeriod?.endDate ? release.tender.tenderPeriod.endDate.split('T')[0] : "Open";
                const rawValue = release.tender?.value?.amount;
                const value = rawValue ? '£' + rawValue.toLocaleString() : "TBA";
                
                const buyer = release.parties?.find(p => p.roles?.includes('buyer'));
                const location = buyer ? buyer.name : "UK Gov";
                
                const type = release.tender?.mainProcurementCategory || "service";

                const row = document.createElement('tr');
                row.className = 'hover:bg-zinc-800 cursor-pointer border-b border-zinc-800/50 transition-colors';
                row.innerHTML = `
                    <td class="py-4 px-4 font-medium text-[#0CBFCA]" title="${title}">${title.substring(0, 50)}...</td>
                    <td class="py-4 px-4 text-zinc-400">${published}</td>
                    <td class="py-4 px-4 text-zinc-400">${closing}</td>
                    <td class="py-4 px-4 font-mono">${value}</td>
                    <td class="py-4 px-4" title="${location}">${location.substring(0, 30)}</td>
                    <td class="py-4 px-4 font-mono text-zinc-500 hover:text-white">View Details</td>
                    <td class="py-4 px-4"><span class="px-3 py-1 rounded-full text-xs bg-zinc-800 text-zinc-300 capitalize border border-zinc-700">${type}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        // Search Bar Listener
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('global-search');
            searchInput.addEventListener('input', (event) => {
                const keyword = event.target.value.toLowerCase();
                const filteredData = allReleases.filter(release => {
                    const title = (release.tender?.title || "").toLowerCase();
                    const buyer = release.parties?.find(p => p.roles?.includes('buyer'));
                    const buyerName = (buyer ? buyer.name : "").toLowerCase();
                    return title.includes(keyword) || buyerName.includes(keyword);
                });
                renderTable(filteredData.slice(0, 20));
            });
        });

        function saveCurrentSearch() { alert('Feature coming soon: Save Search to MySQL Database'); }
        function openAlertModal() { alert('Feature coming soon: Schedule Daily Email Alerts'); }
        
        window.onload = fetchAndRenderLiveData;
    </script>
</body>
</html>
