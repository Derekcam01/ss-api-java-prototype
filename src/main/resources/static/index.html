<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiQuote Dashboard • Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600&display=swap');
        :root { --elcom-blue: 12 191 202; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 h-full flex overflow-hidden font-[Inter] text-left">

    <div id="details-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-3xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950/50">
                <h2 id="modal-title" class="text-xl font-bold text-[#0CBFCA] pr-8">Contract Title</h2>
                <button onclick="closeModal()" class="text-zinc-500 hover:text-white transition-colors"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            </div>
            <div class="p-8 overflow-y-auto space-y-8 flex-1">
                <div>
                    <h3 class="text-white text-xs font-bold uppercase tracking-widest mb-3 opacity-50">Description</h3>
                    <p id="modal-desc" class="text-zinc-300 leading-relaxed text-sm whitespace-pre-wrap">...</p>
                </div>
                <div class="grid grid-cols-2 gap-8 border-t border-zinc-800 pt-6">
                    <div>
                        <h3 class="text-white text-xs font-bold uppercase tracking-widest mb-2 opacity-50">Buyer</h3>
                        <p id="modal-buyer" class="text-zinc-100 font-semibold">...</p>
                    </div>
                    <div>
                        <h3 class="text-white text-xs font-bold uppercase tracking-widest mb-2 opacity-50">Timeline</h3>
                        <div class="text-xs font-mono">
                            <div class="text-zinc-400">STARTS: <span id="modal-start" class="text-white">...</span></div>
                            <div class="text-zinc-400 mt-1">EXPIRES: <span id="modal-end" class="text-white">...</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-6 bg-zinc-950/50 border-t border-zinc-800 flex justify-end">
                <a id="modal-link" href="#" target="_blank" class="px-6 py-2 bg-zinc-800 hover:bg-zinc-700 text-[#0CBFCA] rounded-full text-xs font-bold uppercase tracking-widest transition-all">View Official Notice <i class="fa-solid fa-arrow-up-right-from-square ml-2"></i></a>
            </div>
        </div>
    </div>

    <div class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col p-6">
        <div class="flex items-center gap-x-3 mb-10">
            <div class="w-10 h-10 bg-[#0CBFCA] rounded-xl flex items-center justify-center text-zinc-950 font-bold text-2xl logo-font">MQ</div>
            <div class="logo-font text-2xl font-bold text-white tracking-tighter uppercase">MultiQuote</div>
        </div>
        <nav class="space-y-4">
            <button onclick="showSection('discover')" id="nav-discover" class="w-full flex items-center gap-x-4 px-4 py-4 rounded-2xl bg-zinc-800 text-[#0CBFCA] font-semibold transition-all">
                <i class="fa-solid fa-magnifying-glass"></i><span>DISCOVER</span>
            </button>
            <button onclick="showSection('profiles')" id="nav-profiles" class="w-full flex items-center gap-x-4 px-4 py-4 rounded-2xl hover:bg-zinc-800 text-zinc-400 transition-all">
                <i class="fa-solid fa-bookmark"></i><span>MY PROFILES</span>
            </button>
        </nav>
    </div>

    <div class="flex-1 flex flex-col">
        <header class="h-20 bg-zinc-900/50 border-b border-zinc-800 px-8 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <input id="global-search" placeholder="Quick search..." class="bg-zinc-800 border border-zinc-700 focus:border-[#0CBFCA] rounded-full px-6 py-2.5 w-80 text-sm outline-none transition-all">
                <button onclick="saveProfile()" class="px-6 py-2.5 bg-[#0CBFCA] text-zinc-950 font-bold rounded-full hover:scale-105 active:scale-95 transition-all text-xs uppercase tracking-widest">Save Profile</button>
            </div>
            <div id="results-count" class="text-xs font-mono text-zinc-500 uppercase tracking-widest">Results: 0</div>
        </header>

        <main class="flex-1 overflow-auto p-8">
            <div id="view-discover">
                <table class="w-full text-sm text-left">
                    <thead>
                        <tr class="text-zinc-500 border-b border-zinc-800 uppercase text-[10px] tracking-widest">
                            <th class="pb-4 px-4">Opportunity</th>
                            <th class="pb-4 px-4">Status</th>
                            <th class="pb-4 px-4">Closing</th>
                            <th class="pb-4 px-4">Value</th>
                            <th class="pb-4 px-4 text-right">Details</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-zinc-900"></tbody>
                </table>
            </div>

            <div id="view-profiles" class="hidden">
                <h2 class="text-xl font-bold text-white mb-8 border-b border-zinc-800 pb-4">Saved Search Profiles</h2>
                <div id="profiles-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </main>
    </div>

    <script>
        let allReleases = [];

        function showSection(section) {
            document.getElementById('view-discover').classList.toggle('hidden', section !== 'discover');
            document.getElementById('view-profiles').classList.toggle('hidden', section !== 'profiles');
            if(section === 'profiles') loadProfiles();
        }

        function getStatusTag(dateStr) {
            if (!dateStr) return `<span class="px-2 py-0.5 rounded bg-zinc-800 text-zinc-500 text-[10px] uppercase font-bold">Ongoing</span>`;
            const diffDays = Math.ceil((new Date(dateStr) - new Date()) / (86400000));
            if (diffDays < 0) return `<span class="px-2 py-0.5 rounded bg-red-900/20 text-red-400 text-[10px] border border-red-800/50 uppercase font-bold">Closed</span>`;
            if (diffDays <= 14) return `<span class="px-2 py-0.5 rounded bg-orange-900/20 text-orange-400 text-[10px] border border-orange-800/50 uppercase font-bold">Urgent</span>`;
            return `<span class="px-2 py-0.5 rounded bg-emerald-900/20 text-emerald-400 text-[10px] border border-emerald-800/50 uppercase font-bold">Open</span>`;
        }

        async function fetchTenders() {
            const res = await fetch('/api/live-data');
            const data = await res.json();
            allReleases = data.releases || [];
            renderTable(allReleases);
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            document.getElementById('results-count').innerText = "Results: " + data.length;
            tbody.innerHTML = data.slice(0, 50).map((r, index) => {
                const title = (r.tender?.title || "Contract Notice").substring(0, 60) + "...";
                const closing = r.tender?.tenderPeriod?.endDate ? r.tender.tenderPeriod.endDate.split('T')[0] : 'Open';
                const val = r.tender?.value?.amount ? '£' + r.tender.value.amount.toLocaleString() : "TBA";

                return `
                    <tr class="hover:bg-white/5 transition-colors group cursor-pointer" onclick='openModal(${index})'>
                        <td class="py-5 px-4 font-semibold text-[#0CBFCA] group-hover:underline">${title}</td>
                        <td class="py-5 px-4">${getStatusTag(r.tender?.tenderPeriod?.endDate)}</td>
                        <td class="py-5 px-4 text-zinc-400 font-mono">${closing}</td>
                        <td class="py-5 px-4 font-mono text-white font-semibold">${val}</td>
                        <td class="py-5 px-4 text-right">
                            <i class="fa-solid fa-circle-info text-zinc-700 group-hover:text-[#0CBFCA] transition-colors"></i>
                        </td>
                    </tr>
                `;
            }).join('');
            
            // We store the data globally to access by index in the modal
            window.currentViewData = data;
        }

        function openModal(index) {
            const r = window.currentViewData[index];
            document.getElementById('modal-title').innerText = r.tender?.title || "No Title";
            document.getElementById('modal-desc').innerText = r.tender?.description || "No description provided.";
            document.getElementById('modal-buyer').innerText = r.parties?.find(p => p.roles?.includes('buyer'))?.name || "UK Government Agency";
            document.getElementById('modal-start').innerText = r.tender?.contractPeriod?.startDate ? r.tender.contractPeriod.startDate.split('T')[0] : "TBA";
            document.getElementById('modal-end').innerText = r.tender?.contractPeriod?.endDate ? r.tender.contractPeriod.endDate.split('T')[0] : "TBA";
            
            const link = "https://www.find-tender.service.gov.uk/Notice/" + (r.tender?.id || "");
            document.getElementById('modal-link').href = link;

            document.getElementById('details-modal').classList.remove('hidden');
            document.getElementById('details-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        async function saveProfile() {
            const keyword = document.getElementById('global-search').value;
            if(!keyword) return;
            await fetch('/api/profiles/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({keyword})
            });
            alert("Profile Saved!");
        }

        async function loadProfiles() {
            const list = document.getElementById('profiles-list');
            const res = await fetch('/api/profiles/list');
            const profiles = await res.json();
            list.innerHTML = profiles.map(p => `
                <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 hover:border-[#0CBFCA] transition-all group relative">
                    <button onclick="deleteProfile(${p.id}, event)" class="absolute top-4 right-4 text-zinc-700 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                    <h4 class="text-white font-bold text-xl mb-4">${p.keyword}</h4>
                    <button onclick="quickSearch('${p.keyword}')" class="w-full py-2 bg-zinc-800 rounded-xl text-xs font-bold text-zinc-400 group-hover:bg-[#0CBFCA] group-hover:text-zinc-950 transition-all uppercase">Run Search</button>
                </div>
            `).join('');
        }

        async function deleteProfile(id, event) {
            event.stopPropagation();
            if(!confirm("Delete this profile?")) return;
            await fetch('/api/profiles/delete/' + id, { method: 'DELETE' });
            loadProfiles();
        }

        function quickSearch(k) {
            document.getElementById('global-search').value = k;
            showSection('discover');
            const filtered = allReleases.filter(r => (r.tender?.title || "").toLowerCase().includes(k.toLowerCase()));
            renderTable(filtered);
        }

        document.getElementById('global-search').addEventListener('input', (e) => {
            const k = e.target.value.toLowerCase();
            const filtered = allReleases.filter(r => (r.tender?.title || "").toLowerCase().includes(k));
            renderTable(filtered);
        });

        window.onload = fetchTenders;
    </script>
</body>
</html>
