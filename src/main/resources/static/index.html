<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiQuote Opportunity Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --elcom-blue: 12 191 202; }
        .tail-container { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        table { border-collapse: collapse; }
        th { background-color: rgb(var(--elcom-blue)); color: white; }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200 h-full relative text-left">
    
    <div id="details-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
        <div class="bg-zinc-900 border border-zinc-700 rounded-2xl w-[800px] max-h-[80vh] flex flex-col shadow-2xl">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950/50 rounded-t-2xl">
                <h2 id="modal-title" class="text-xl font-semibold text-[#0CBFCA] pr-4">Contract Title</h2>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto space-y-6 flex-1 text-sm text-zinc-300">
                <div>
                    <h3 class="text-white font-medium mb-2 border-b border-zinc-800 pb-1">Contract Description</h3>
                    <p id="modal-desc" class="leading-relaxed whitespace-pre-wrap">...</p>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <h3 class="text-white font-medium mb-2 border-b border-zinc-800 pb-1">Buyer</h3>
                        <p id="modal-buyer" class="text-zinc-400">...</p>
                    </div>
                    <div>
                        <h3 class="text-white font-medium mb-2 border-b border-zinc-800 pb-1">Dates</h3>
                        <p class="text-zinc-400 text-xs uppercase">Starts: <span id="modal-start" class="text-white font-mono ml-2">...</span></p>
                        <p class="text-zinc-400 text-xs uppercase mt-1">Ends: <span id="modal-end" class="text-white font-mono ml-4">...</span></p>
                    </div>
                </div>
                <div>
                     <h3 class="text-white font-medium mb-2 border-b border-zinc-800 pb-1">Official FTS Link</h3>
                     <a id="modal-link" href="#" target="_blank" class="text-[#0CBFCA] hover:underline break-all">...</a>
                </div>
            </div>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col z-10 p-6">
            <div class="flex items-center gap-x-3 mb-8">
                <div class="w-9 h-9 bg-[#0CBFCA] rounded-2xl flex items-center justify-center text-zinc-950 font-bold text-2xl logo-font">MQ</div>
                <div class="logo-font text-3xl font-semibold tracking-tighter text-white">MultiQuote</div>
            </div>
            <nav class="space-y-2">
                <a href="#" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl bg-zinc-800 text-white font-medium">
                    <i class="fa-solid fa-magnifying-glass w-5"></i><span>Discover</span>
                </a>
                <a href="#" class="flex items-center gap-x-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-zinc-400">
                    <i class="fa-solid fa-bookmark w-5"></i><span>My Profiles</span>
                </a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col relative z-0">
            <header class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <input id="global-search" placeholder="Search keywords..." class="bg-zinc-800 border border-zinc-700 focus:border-[#0CBFCA] rounded-3xl px-6 py-2 w-80 text-sm outline-none">
                    <span id="results-count" class="text-xs text-zinc-500 font-mono">Found: 0</span>
                    <button onclick="saveProfile()" class="px-4 py-2 bg-[#0CBFCA] text-zinc-950 font-semibold rounded-3xl hover:bg-[#0aa6b0] text-xs uppercase tracking-wider transition-all">Save Profile</button>
                </div>
            </header>

            <div class="flex-1 p-8 overflow-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left border-b border-zinc-700">
                            <th class="py-4 px-4 rounded-tl-xl">Opportunity</th>
                            <th class="py-4 px-4">Status</th>
                            <th class="py-4 px-4">Closing</th>
                            <th class="py-4 px-4">Duration</th>
                            <th class="py-4 px-4 cursor-pointer hover:opacity-80" onclick="sortByValue()">Value <i class="fa-solid fa-sort ml-1"></i></th>
                            <th class="py-4 px-4">Buyer</th>
                            <th class="py-4 px-4 rounded-tr-xl">Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-zinc-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allReleases = [];
        let sortDescending = true;

        async function fetchAndRenderLiveData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="7" class="py-12 text-center text-[#0CBFCA] animate-pulse">Fetching UK Gov Data...</td></tr>';
            try {
                const response = await fetch('/api/live-data');
                const data = await response.json();
                allReleases = data.releases || [];
                renderTable(allReleases.slice(0, 30));
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="7" class="py-4 text-center text-red-400">Connection Failed. Check terminal.</td></tr>';
            }
        }

        async function saveProfile() {
            const keyword = document.getElementById('global-search').value;
            if (!keyword) return alert("Type a keyword first!");
            try {
                await fetch('/api/profiles/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: keyword })
                });
                alert("Success! Profile saved for: " + keyword);
            } catch (err) { alert("Error saving profile."); }
        }

        function getStatusTag(dateStr) {
            if (!dateStr) return `<span class="px-2 py-0.5 rounded bg-zinc-800 text-zinc-500 text-[10px] uppercase">Ongoing</span>`;
            const diffDays = Math.ceil((new Date(dateStr) - new Date()) / (86400000));
            if (diffDays < 0) return `<span class="px-2 py-0.5 rounded bg-red-900/20 text-red-400 text-[10px] border border-red-800/50 uppercase font-semibold">Closed</span>`;
            if (diffDays <= 14) return `<span class="px-2 py-0.5 rounded bg-orange-900/20 text-orange-400 text-[10px] border border-orange-800/50 uppercase font-semibold">Urgent</span>`;
            return `<span class="px-2 py-0.5 rounded bg-emerald-900/20 text-emerald-400 text-[10px] border border-emerald-800/50 uppercase font-semibold">Open</span>`;
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            document.getElementById('results-count').innerText = "Found: " + data.length;
            tbody.innerHTML = ''; 
            data.forEach(r => {
                const title = (r.tender?.title || "Contract Notice").substring(0, 50) + "...";
                const closing = r.tender?.tenderPeriod?.endDate ? r.tender.tenderPeriod.endDate.split('T')[0] : 'Open';
                const s = r.tender?.contractPeriod?.startDate;
                const e = r.tender?.contractPeriod?.endDate;
                let duration = "TBA";
                if(s && e) {
                    const months = (new Date(e).getFullYear() - new Date(s).getFullYear()) * 12 + (new Date(e).getMonth() - new Date(s).getMonth());
                    duration = months > 0 ? months + "m" : "Short";
                }
                const value = r.tender?.value?.amount ? '£' + r.tender.value.amount.toLocaleString() : "TBA";
                const buyer = (r.parties?.find(p => p.roles?.includes('buyer'))?.name || "UK Gov").substring(0, 25);

                const row = document.createElement('tr');
                row.className = 'hover:bg-zinc-800/40 border-b border-zinc-900 transition-colors';
                row.innerHTML = `
                    <td class="py-4 px-4 font-medium text-[#0CBFCA] cursor-pointer" onclick='openModal(${JSON.stringify(r).replace(/'/g, "&apos;")})'>${title}</td>
                    <td class="py-4 px-4">${getStatusTag(r.tender?.tenderPeriod?.endDate)}</td>
                    <td class="py-4 px-4 text-zinc-400 font-mono">${closing}</td>
                    <td class="py-4 px-4 text-zinc-500 font-mono text-xs">${duration}</td>
                    <td class="py-4 px-4 font-mono text-white font-semibold">${value}</td>
                    <td class="py-4 px-4 text-zinc-400 text-xs">${buyer}</td>
                    <td class="py-4 px-4"><button class="view-btn text-xs bg-zinc-800 px-3 py-1 rounded border border-zinc-700 hover:text-white transition-all">VIEW</button></td>
                `;
                row.querySelector('.view-btn').onclick = () => openModal(r);
                tbody.appendChild(row);
            });
        }

        function sortByValue() {
            allReleases.sort((a, b) => (b.tender?.value?.amount || 0) - (a.tender?.value?.amount || 0));
            renderTable(allReleases.slice(0, 30));
        }

        function openModal(r) {
            document.getElementById('modal-title').innerText = r.tender?.title || "No Title";
            document.getElementById('modal-desc').innerText = r.tender?.description || "No description provided.";
            document.getElementById('modal-buyer').innerText = r.parties?.find(p => p.roles?.includes('buyer'))?.name || "UK Gov";
            document.getElementById('modal-start').innerText = r.tender?.contractPeriod?.startDate ? r.tender.contractPeriod.startDate.split('T')[0] : "TBA";
            document.getElementById('modal-end').innerText = r.tender?.contractPeriod?.endDate ? r.tender.contractPeriod.endDate.split('T')[0] : "TBA";
            const link = "https://www.find-tender.service.gov.uk/Notice/" + (r.tender?.id || "");
            const linkEl = document.getElementById('modal-link');
            linkEl.href = link; linkEl.innerText = link;
            document.getElementById('details-modal').classList.remove('hidden');
            document.getElementById('details-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('details-modal').classList.add('hidden');
            document.getElementById('details-modal').classList.remove('flex');
        }

        document.getElementById('global-search').addEventListener('input', (e) => {
            const k = e.target.value.toLowerCase();
            const filtered = allReleases.filter(r => (r.tender?.title || "").toLowerCase().includes(k) || (r.parties?.find(p => p.roles?.includes('buyer'))?.name || "").toLowerCase().includes(k));
            renderTable(filtered.slice(0, 30));
        });

        window.onload = fetchAndRenderLiveData;
    </script>
</body>
</html>
